document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.

      }
      return map;

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

      // anchors, which closest()/IDL .target get wrong.

            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +

            'if (h.charAt(0) !== "#") {' +

              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.

        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>

      // attributes through, so match the full opening tag.

      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting

      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);

      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

F;font-weight:600;\">Analytical rigor<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Decisions grounded in reliable data, not assumptions.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;\"><span style=\"font-size:22px;color:#29251F;font-weight:600;\">Customer-centric thinking<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">The voice of the market, present in every key decision.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;\"><span style=\"font-size:22px;color:#29251F;font-weight:600;\">Organizational alignment<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Strategy, operations, and teams pulling the same direction.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ GROWTH ═══ -->\n<section id=\"growth\" style=\"background:#FFFFFF;border-top:1px solid #D7D1C4;\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:104px 48px;display:flex;flex-direction:column;gap:56px;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.22em;text-transform:uppercase;color:#6E5F45;\">Selected Case Studies<\u002Fspan>\n      <h2 style=\"margin:0;font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:52px;line-height:1.05;letter-spacing:-0.02em;color:#29251F;\">Growth stories<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:28px;\">\n\n      <!-- Case 1 -->\n      <div style=\"background:#FCFBF7;border:1px solid #D7D1C4;border-left:3px solid #467B7D;border-radius:12px;padding:44px 48px;display:flex;flex-direction:row;gap:56px;align-items:flex-start;\">\n        <div style=\"flex:0 0 240px;display:flex;flex-direction:column;gap:14px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.16em;color:#467B7D;\">CASE 01<\u002Fspan>\n          <span style=\"font-family:'DM Serif Display',Georgia,serif;font-size:72px;line-height:0.9;color:#467B7D;\">$47M<\u002Fspan>\n          <span style=\"font-size:16px;color:#6A6357;line-height:1.4;\">ARR scaled from $6.9M — over 47% CAGR<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:20px;\">\n          <h3 style=\"margin:0;font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:30px;line-height:1.15;color:#29251F;\">Built the product function and scaled a $47M SaaS business<\u002Fh3>\n          <p style=\"margin:0;font-size:18px;line-height:1.6;color:#6A6357;\">Joined PlanHub as its first product leader with no formal product practices, analytics, design system, or feedback loops in place — and stood up the entire discipline.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px;border-top:1px solid #D7D1C4;padding-top:20px;\">\n            <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#467B7D;flex:0 0 14px;\">→<\u002Fspan><span style=\"font-size:18px;color:#29251F;line-height:1.5;\">Established the company's first Product, UX Design, and Product Marketing org with roadmap governance.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#467B7D;flex:0 0 14px;\">→<\u002Fspan><span style=\"font-size:18px;color:#29251F;line-height:1.5;\">Introduced Pendo, QuickSight, NPS, and structured research to build a data-driven culture.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#467B7D;flex:0 0 14px;\">→<\u002Fspan><span style=\"font-size:18px;color:#29251F;line-height:1.5;\">Created a repeatable operating model that enabled expansion into CRM, Takeoff, Estimation, and AI.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Case 2 -->\n      <div style=\"background:#FCFBF7;border:1px solid #D7D1C4;border-left:3px solid #3E6F4E;border-radius:12px;padding:44px 48px;display:flex;flex-direction:row;gap:56px;align-items:flex-start;\">\n        <div style=\"flex:0 0 240px;display:flex;flex-direction:column;gap:14px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.16em;color:#3E6F4E;\">CASE 02<\u002Fspan>\n          <span style=\"font-family:'DM Serif Display',Georgia,serif;font-size:72px;line-height:0.9;color:#3E6F4E;\">9K+<\u002Fspan>\n          <span style=\"font-size:16px;color:#6A6357;line-height:1.4;\">Completed prequalifications, with ~30% Premier NPS lift<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:20px;\">\n          <h3 style=\"margin:0;font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:30px;line-height:1.15;color:#29251F;\">Transformed marketplace quality through data-driven network strategy<\u002Fh3>\n          <p style=\"margin:0;font-size:18px;line-height:1.6;color:#6A6357;\">Marketplace health was judged on surface-level metrics that obscured the real drivers of engagement, retention, and liquidity — so I rebuilt how the network was measured.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px;border-top:1px solid #D7D1C4;padding-top:20px;\">\n            <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#3E6F4E;flex:0 0 14px;\">→<\u002Fspan><span style=\"font-size:18px;color:#29251F;line-height:1.5;\">Introduced a localized CBSA-level growth model to surface geographic supply-demand imbalances.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#3E6F4E;flex:0 0 14px;\">→<\u002Fspan><span style=\"font-size:18px;color:#29251F;line-height:1.5;\">Grew completed subcontractor prequalifications past 9,000, lifting marketplace quality and trust.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#3E6F4E;flex:0 0 14px;\">→<\u002Fspan><span style=\"font-size:18px;color:#29251F;line-height:1.5;\">Built the executive framework still used to evaluate liquidity, engagement, and retention.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Case 3 -->\n      <div style=\"background:#FCFBF7;border:1px solid #D7D1C4;border-left:3px solid #946A28;border-radius:12px;padding:44px 48px;display:flex;flex-direction:row;gap:56px;align-items:flex-start;\">\n        <div style=\"flex:0 0 240px;display:flex;flex-direction:column;gap:14px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.16em;color:#946A28;\">CASE 03<\u002Fspan>\n          <span style=\"font-family:'DM Serif Display',Georgia,serif;font-size:72px;line-height:0.9;color:#946A28;\">66K<\u002Fspan>\n          <span style=\"font-size:16px;color:#6A6357;line-height:1.4;\">Annual projects, with 10,000+ new companies added<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:20px;\">\n          <h3 style=\"margin:0;font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:30px;line-height:1.15;color:#29251F;\">Created new revenue streams and go-to-market engines<\u002Fh3>\n          <p style=\"margin:0;font-size:18px;line-height:1.6;color:#6A6357;\">Monetization leaned almost entirely on the core subcontractor offering. I personally led the launch of new product lines that diversified growth beyond it.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px;border-top:1px solid #D7D1C4;padding-top:20px;\">\n            <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#946A28;flex:0 0 14px;\">→<\u002Fspan><span style=\"font-size:18px;color:#29251F;line-height:1.5;\">Launched Keyword Search, Competitive Analytics, Bid Calendar, Supplier Solutions, and GC Directory.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#946A28;flex:0 0 14px;\">→<\u002Fspan><span style=\"font-size:18px;color:#29251F;line-height:1.5;\">Built the supplier monetization strategy, freemium GTM motion, and pricing governance.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#946A28;flex:0 0 14px;\">→<\u002Fspan><span style=\"font-size:18px;color:#29251F;line-height:1.5;\">Helped scale the business toward $50M ARR while adding 10,000+ companies to the network.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ OPERATING MODEL / APPROACH ═══ -->\n<section id=\"approach\" style=\"background:#EDE9E0;border-top:1px solid #D7D1C4;\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:104px 48px;display:flex;flex-direction:column;gap:56px;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.22em;text-transform:uppercase;color:#6E5F45;\">How I Operate<\u002Fspan>\n      <h2 style=\"margin:0;font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:52px;line-height:1.05;letter-spacing:-0.02em;color:#29251F;\">Operating model<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:32px;\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#467B7D;\">01<\u002Fspan><span style=\"font-size:22px;color:#29251F;font-weight:600;line-height:1.15;\">Read the market<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Turn customer, competitive, and industry intelligence into a clear point of view.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#3E6F4E;\">02<\u002Fspan><span style=\"font-size:22px;color:#29251F;font-weight:600;line-height:1.15;\">Set the strategy<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Connect that view to a few high-leverage bets the whole org can rally behind.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#946A28;\">03<\u002Fspan><span style=\"font-size:22px;color:#29251F;font-weight:600;line-height:1.15;\">Build the functions<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Stand up Product, Design, Marketing, and RevOps — plus global centers of excellence.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#B14228;\">04<\u002Fspan><span style=\"font-size:22px;color:#29251F;font-weight:600;line-height:1.15;\">Scale with discipline<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Instrument with analytics and governance so gains hold as the business grows.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:32px;border-top:1px solid #D7D1C4;padding-top:48px;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.22em;text-transform:uppercase;color:#6E5F45;\">Technology Depth<\u002Fspan>\n        <h3 style=\"margin:0;font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:40px;line-height:1.1;letter-spacing:-0.015em;color:#29251F;\">AI &amp; digital expertise<\u002Fh3>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n        <div style=\"background:#FCFBF7;border:1px solid #D7D1C4;border-radius:12px;padding:36px 40px;display:flex;flex-direction:column;gap:20px;\">\n          <span style=\"font-size:22px;color:#29251F;font-weight:600;\">AI &amp; data intelligence<\u002Fspan>\n          <div style=\"display:flex;flex-direction:column;gap:14px;\">\n            <span style=\"font-size:18px;color:#6A6357;line-height:1.5;\">AI-powered go-to-market: targeting, personalization, audience segmentation<\u002Fspan>\n            <span style=\"font-size:18px;color:#6A6357;line-height:1.5;\">Customer intelligence platforms &amp; behavioral analytics<\u002Fspan>\n            <span style=\"font-size:18px;color:#6A6357;line-height:1.5;\">Product telemetry feeding acquisition &amp; retention<\u002Fspan>\n            <span style=\"font-size:18px;color:#6A6357;line-height:1.5;\">HubSpot-led RevOps: CRM architecture, lifecycle automation &amp; pipeline analytics<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FCFBF7;border:1px solid #D7D1C4;border-radius:12px;padding:36px 40px;display:flex;flex-direction:column;gap:20px;\">\n          <span style=\"font-size:22px;color:#29251F;font-weight:600;\">Global digital platforms<\u002Fspan>\n          <div style=\"display:flex;flex-direction:column;gap:14px;\">\n            <span style=\"font-size:18px;color:#6A6357;line-height:1.5;\">Cloud POS, payment, loyalty &amp; gift-card systems<\u002Fspan>\n            <span style=\"font-size:18px;color:#6A6357;line-height:1.5;\">Enterprise data platform deployed across 100+ countries<\u002Fspan>\n            <span style=\"font-size:18px;color:#6A6357;line-height:1.5;\">Mobile inventory technology scaled to 31,000+ locations<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ BOARD & GLOBAL ═══ -->\n<section id=\"board\" style=\"background:#F5F2EC;border-top:1px solid #D7D1C4;\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:104px 48px;display:flex;flex-direction:column;gap:56px;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.22em;text-transform:uppercase;color:#6E5F45;\">Enterprise &amp; Governance<\u002Fspan>\n      <h2 style=\"margin:0;font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:52px;line-height:1.05;letter-spacing:-0.02em;color:#29251F;\">Board &amp; global exposure<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"row-board\" style=\"display:flex;flex-direction:row;gap:64px;align-items:stretch;\">\n      <div style=\"flex:0 0 360px;display:flex;flex-direction:column;gap:40px;border-right:1px solid #D7D1C4;padding-right:56px;\">\n        <div style=\"display:flex;flex-direction:column;gap:8px;\"><span style=\"font-family:'DM Serif Display',Georgia,serif;font-size:72px;line-height:0.95;color:#386466;\">$2B<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.5;\">Annual spend governed under a global sourcing framework<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\"><span style=\"font-family:'DM Serif Display',Georgia,serif;font-size:72px;line-height:0.95;color:#467B7D;\">30+<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.5;\">Global centers of excellence &amp; advisory teams established<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:28px;justify-content:center;\">\n        <div style=\"display:flex;flex-direction:column;gap:8px;\"><span style=\"font-size:22px;color:#29251F;font-weight:600;\">CEO, board &amp; PE engagement<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Regularly engaged with CEOs, boards, and private equity investors on strategy, growth, and operational performance.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\"><span style=\"font-size:22px;color:#29251F;font-weight:600;\">Equity transactions &amp; ownership transitions<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Played a key leadership role through multiple equity transactions — supporting due diligence, growth planning, and post-acquisition execution during PlanHub’s investment by Mainsail Partners and subsequent acquisition by GrowthCurve Capital.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\"><span style=\"font-size:22px;color:#29251F;font-weight:600;\">Board engagement programs<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Created executive and board engagement programs to improve governance, communication, and stakeholder alignment.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\"><span style=\"font-size:22px;color:#29251F;font-weight:600;\">Multi-region executive sponsorship<\u002Fspan><span style=\"font-size:18px;color:#6A6357;line-height:1.6;\">Secured cross-regional alignment on enterprise risk, S&amp;OP effectiveness, and digital investment strategy — setting global agendas for supply-chain modernization, food traceability, and digital transformation.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ REFERENCES ═══ -->\n<section id=\"references\" style=\"background:#FFFFFF;border-top:1px solid #D7D1C4;\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:104px 48px;display:flex;flex-direction:column;gap:56px;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.22em;text-transform:uppercase;color:#6E5F45;\">Validation<\u002Fspan>\n      <h2 style=\"margin:0;font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:52px;line-height:1.05;letter-spacing:-0.02em;color:#29251F;\">References &amp; recognition<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"row-refs\" style=\"display:flex;flex-direction:row;gap:64px;align-items:flex-start;\">\n      <div style=\"flex:0 0 320px;display:flex;flex-direction:column;gap:22px;border-right:1px solid #D7D1C4;padding-right:56px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.14em;text-transform:uppercase;color:#6E5F45;\">Recognition<\u002Fspan>\n        <span style=\"font-size:18px;color:#29251F;\">Inc. 5000 — Six years straight<\u002Fspan>\n        <span style=\"font-size:18px;color:#29251F;\">Deloitte Technology Fast 500<\u002Fspan>\n        <span style=\"font-size:18px;color:#29251F;\">InformationWeek Top 250 Innovator<\u002Fspan>\n        <span style=\"font-size:18px;color:#29251F;\">Hospitality Technology Breakthrough Award<\u002Fspan>\n        <span style=\"font-size:18px;color:#29251F;\">Multiple leadership &amp; team performance honors<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:24px;\">\n        <div style=\"background:#FCFBF7;border:1px solid #D7D1C4;border-radius:12px;padding:36px 40px;display:flex;flex-direction:column;gap:16px;\">\n          <span style=\"font-family:'DM Serif Display',Georgia,serif;font-size:40px;line-height:0;color:#467B7D;height:22px;\">“<\u002Fspan>\n          <p style=\"margin:0;font-style:italic;font-size:18px;line-height:1.6;color:#29251F;\">He brings structure, clarity, and data-backed decision-making to everything he touches. Whether it's building out retention dashboards, unpacking churn drivers, or operationalizing CSM processes, Evan can be counted on to produce clean, thoughtful, and grounded insights. He's also very thorough — when a task is in Evan's court, it gets done well.<\u002Fp>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#6E5F45;\">— CEO, PlanHub<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#FCFBF7;border:1px solid #D7D1C4;border-radius:12px;padding:36px 40px;display:flex;flex-direction:column;gap:16px;\">\n          <span style=\"font-family:'DM Serif Display',Georgia,serif;font-size:40px;line-height:0;color:#467B7D;height:22px;\">“<\u002Fspan>\n          <p style=\"margin:0;font-style:italic;font-size:18px;line-height:1.6;color:#29251F;\">Evan's greatest strength, from my perspective, is his ability to deconstruct an issue and provide a solution. He has been pivotal in his analysis of marketplace health and growth needs. And although we still have challenges here, he has been able to collect and communicate the data that has been foundational in identifying areas of improvement to continue growth.<\u002Fp>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#6E5F45;\">— Peer, PlanHub<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ CONTACT / SEEKING ═══ -->\n<section id=\"contact\" style=\"background:#29251F;border-top:1px solid #29251F;\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:104px 48px;display:flex;flex-direction:column;gap:56px;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.22em;text-transform:uppercase;color:#A99E89;\">The Ask<\u002Fspan>\n      <h2 style=\"margin:0;font-family:'DM Serif Display',Georgia,serif;font-weight:400;font-size:52px;line-height:1.05;letter-spacing:-0.02em;color:#F5F2EC;\">What I'm seeking<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;\">\n      <div style=\"background:#33302A;border:1px solid #4A463E;border-radius:12px;padding:40px;display:flex;flex-direction:column;gap:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#8FB7B5;\">01<\u002Fspan><span style=\"font-size:22px;color:#F5F2EC;font-weight:600;line-height:1.15;\">C-level &amp; VP leadership<\u002Fspan><span style=\"font-size:18px;color:#C4BBAA;line-height:1.6;\">A wide set of C-level and VP mandates across Operations and Product Delivery at scaling SaaS &amp; tech-enabled businesses.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:#33302A;border:1px solid #4A463E;border-radius:12px;padding:40px;display:flex;flex-direction:column;gap:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#8FB7B5;\">02<\u002Fspan><span style=\"font-size:22px;color:#F5F2EC;font-weight:600;line-height:1.15;\">Transformation mandates<\u002Fspan><span style=\"font-size:18px;color:#C4BBAA;line-height:1.6;\">Turnarounds and modernization where strategy must meet execution.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:#33302A;border:1px solid #4A463E;border-radius:12px;padding:40px;display:flex;flex-direction:column;gap:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#8FB7B5;\">03<\u002Fspan><span style=\"font-size:22px;color:#F5F2EC;font-weight:600;line-height:1.15;\">Board &amp; advisory<\u002Fspan><span style=\"font-size:18px;color:#C4BBAA;line-height:1.6;\">Growth, digital, and operating-model guidance for boards and investors.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:row;align-items:center;justify-content:space-between;border-top:1px solid #4A463E;padding-top:44px;flex-wrap:wrap;gap:24px;\">\n      <span style=\"font-family:'DM Serif Display',Geor
